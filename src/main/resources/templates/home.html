<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home - Data Mahasiswa</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9fbfc;
            color: #333;
            margin: 0;
            padding: 40px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h2 {
            margin: 0;
            color: #2c3e50;
        }
        .btn {
            display: inline-block;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            transition: background-color 0.3s;
        }
        .btn-primary {
            background-color: #28a745;
        }
        .btn-primary:hover {
            background-color: #218838;
        }
        .btn-danger {
            background-color: #dc3545;
        }
        .btn-danger:hover {
            background-color: #c82333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        table th, table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        table th {
            background-color: #f1f5f9;
            font-weight: 600;
            color: #333;
        }
        table tbody tr:hover {
            background-color: #f8f9fa;
        }
        .empty-state {
            text-align: center;
            color: #777;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <h2>Daftar Mahasiswa</h2>
        <a href="/form" class="btn btn-primary">+ Tambah Data</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>NIM</th>
            <th>Nama</th>
            <th>Umur</th>
            <th>Prodi</th>
            <th>Jenis Kelamin</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td colspan="5" class="empty-state">Belum ada data mahasiswa</td>
        </tr>
        </tbody>
    </table>

    <div style="text-align: right;">
        <a href="/" class="btn btn-danger">Logout</a>
    </div>
</div>

</body>
</html>
