<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home - Data Mahasiswa</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d47a1 100%);
            color: #e0e0e0;
            margin: 0;
            padding: 40px;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 20px rgba(13, 71, 161, 0.2);
            border: 1px solid #0d47a1;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        h2 {
            margin: 0;
            color: #87ceeb;
            font-size: 28px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        .btn {
            display: inline-block;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #1565c0 0%, #1976d2 100%);
            border: 1px solid #0d47a1;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #1976d2 0%, #1e88e5 100%);
            box-shadow: 0 4px 12px rgba(13, 71, 161, 0.4);
            transform: translateY(-2px);
        }
        .btn-danger {
            background: linear-gradient(135deg, #c62828 0%, #e53935 100%);
            border: 1px solid #b71c1c;
        }
        .btn-danger:hover {
            background: linear-gradient(135deg, #e53935 0%, #f44336 100%);
            box-shadow: 0 4px 12px rgba(229, 57, 53, 0.4);
            transform: translateY(-2px);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        table th, table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        table th {
            background-color: #0d47a1;
            font-weight: 600;
            color: #87ceeb;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        table tbody tr:hover {
            background-color: #2a2a2a;
        }
        table tbody tr {
            transition: background-color 0.3s;
        }
        table td {
            color: #e0e0e0;
        }
        .empty-state {
            text-align: center;
            color: #888;
            font-style: italic;
            padding: 30px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <h2>Daftar Mahasiswa</h2>
        <a href="/form" class="btn btn-primary">+ Tambah Data</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>NIM</th>
            <th>Nama</th>
            <th>Umur</th>
            <th>Prodi</th>
            <th>Jenis Kelamin</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(mahasiswaList)}">
            <td colspan="5" class="empty-state">Belum ada data mahasiswa</td>
        </tr>

        <tr th:each="mhs : ${mahasiswaList}">
            <td th:text="${mhs.nim}"></td>
            <td th:text="${mhs.nama}"></td>
            <td th:text="${mhs.umur}"></td>
            <td th:text="${mhs.prodi}"></td>
            <td th:text="${mhs.jenisKelamin}"></td>
        </tr>
        </tbody>
    </table>

    <div style="text-align: right;">
        <a href="/" class="btn btn-danger">Logout</a>
    </div>
</div>

</body>
</html>
