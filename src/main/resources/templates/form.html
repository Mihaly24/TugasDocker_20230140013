<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Input Data Mahasiswa</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d47a1 100%);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }
        .form-container {
            background-color: #1e1e1e;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 20px rgba(13, 71, 161, 0.2);
            width: 100%;
            max-width: 500px;
            border: 1px solid #0d47a1;
        }
        h2 {
            margin-top: 0;
            color: #87ceeb;
            border-bottom: 2px solid #0d47a1;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 24px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #87ceeb;
            font-weight: 500;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #0d47a1;
            border-radius: 4px;
            box-sizing: border-box;
            background-color: #2a2a2a;
            color: #87ceeb;
            transition: all 0.3s;
        }
        input[type="text"]::placeholder, input[type="number"]::placeholder {
            color: #666;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            border-color: #87ceeb;
            outline: none;
            box-shadow: 0 0 8px rgba(135, 206, 235, 0.5);
            background-color: #333;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            padding-top: 5px;
        }
        .radio-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #87ceeb;
        }
        .radio-group input[type="radio"] {
            cursor: pointer;
            accent-color: #1565c0;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            flex: 1;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-submit {
            background: linear-gradient(135deg, #0d47a1 0%, #1565c0 100%);
            color: white;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #1565c0 0%, #1976d2 100%);
            box-shadow: 0 4px 12px rgba(13, 71, 161, 0.4);
            transform: translateY(-2px);
        }
        .btn-cancel {
            background: linear-gradient(135deg, #424242 0%, #616161 100%);
            color: white;
        }
        .btn-cancel:hover {
            background: linear-gradient(135deg, #616161 0%, #757575 100%);
            box-shadow: 0 4px 12px rgba(97, 97, 97, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Form Tambah Data</h2>

    <form action="/simpan" method="post">
        <div class="form-group">
            <label for="nim">NIM</label>
            <input type="text" id="nim" name="nim" required>
        </div>

        <div class="form-group">
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" name="nama" required>
        </div>

        <div class="form-group">
            <label for="umur">Umur</label>
            <input type="number" id="umur" name="umur" min="15" max="100" required>
        </div>

        <div class="form-group">
            <label for="prodi">Program Studi</label>
            <input type="text" id="prodi" name="prodi" required>
        </div>

        <div class="form-group">
            <label>Jenis Kelamin</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="jenisKelamin" value="Laki-laki" required> Laki-laki
                </label>
                <label>
                    <input type="radio" name="jenisKelamin" value="Perempuan" required> Perempuan
                </label>
            </div>
        </div>

        <div class="button-group">
            <button type="submit" class="btn btn-submit">Simpan Data</button>
            <a href="/home" class="btn btn-cancel">Batal</a>
        </div>
    </form>
</div>

</body>
</html>
